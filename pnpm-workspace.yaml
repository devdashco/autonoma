packages:
  - apps/**
  - packages/**
  - "!**/.claude/**"
  - "!apps/**/.output/**"
  - "!apps/**/.nitro/**"

allowBuilds:
  '@ffmpeg-installer/darwin-arm64': true
  '@ffmpeg-installer/darwin-x64': true
  '@ffmpeg-installer/linux-arm64': true
  '@ffmpeg-installer/linux-x64': true
  '@google/genai': true
  '@prisma/engines': true
  '@swc/core': true
  core-js: true
  cpu-features: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true

catalog:
  '@ai-sdk/anthropic': ^3.0.0
  '@ai-sdk/google': ^3.0.30
  '@ai-sdk/groq': ^3.0.24
  '@ai-sdk/openai': ^3.0.0
  '@kubernetes/client-node': ^1.4.0
  '@octokit/app': ^16.1.2
  '@octokit/core': ^7.0.6
  '@octokit/plugin-retry': ^8.1.0
  '@octokit/plugin-throttling': ^11.0.3
  '@octokit/webhooks': ^14.2.0
  '@radix-ui/react-slot': ^1.2.4
  '@sentry/node': ^10.39.0
  '@sentry/react': ^10.39.0
  '@t3-oss/env-core': ^0.13.10
  '@tanstack/react-table': ^8.21.3
  '@temporalio/activity': 1.15.0
  '@temporalio/client': 1.15.0
  '@temporalio/testing': 1.15.0
  '@temporalio/worker': 1.15.0
  '@temporalio/workflow': 1.15.0
  '@trpc/client': ^11.10.0
  '@trpc/react-query': ^11.10.0
  '@trpc/server': ^11.10.0
  '@trpc/tanstack-react-query': ^11.10.0
  '@types/node': ^25.2.3
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  ai: ^6.0.94
  '@better-auth/api-key': ^1.6.14
  better-auth: ^1.6.14
  dotenv: ^17.3.1
  hono: ^4.12.25
  playwright: 1.56.1
  react: ^19.2.4
  react-dom: ^19.2.4
  shell-quote: 1.8.4
  tailwindcss: '^4.2.2'
  tsx: ^4.21.0
  typescript: ^6.0.3
  vitest: ^4.1.4
  zod: 4.3.6

minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - js-yaml@4.1.2
  - '@opentelemetry/core@2.8.0'
  - undici@6.27.0

onlyBuiltDependencies:
  - '@prisma/engines'
  - prisma

overrides:
  '@hono/node-server@<1.19.13': ^1.19.13
  '@opentelemetry/core@<2.8.0': ^2.8.0
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  fast-xml-parser@<5.7.0: ^5.7.0
  fast-xml-parser@>=5.0.0 <5.3.8: ^5.3.8
  fast-xml-parser@>=5.0.0 <5.5.6: ^5.5.6
  fast-xml-parser@>=5.0.0 <5.5.7: ^5.5.7
  ip-address@<=10.1.0: ^10.1.1
  js-yaml@<=4.1.1: ^4.1.2
  # gray-matter (used by @autonoma-ai/planner) is built against js-yaml 3.x and
  # breaks on the 4.x major the global override above would otherwise force on
  # it. Keep this single subtree on the patched 3.x line; everything else stays
  # on 4.1.2+.
  gray-matter>js-yaml: ^3.14.1
  serialize-javascript@<=7.0.2: ^7.0.3
  serialize-javascript@>=5.0.0 <7.0.5: ^7.0.5
  uuid@<11.1.1: ^11.1.1
