# Coolify self-host stack for Autonoma (core / "preview" topology).
#
# Mirrors what Autonoma runs for its own preview envs (.preview.yaml): db +
# redis + temporal + api + ui, PREVIEWKIT_ENV=true for email/password login,
# prisma migrate on boot. Test-execution WORKERS + engine are NOT here yet
# (phase 2) — the API still dispatches Temporal workflows, workers consume them.
#
# Coolify's docker-compose build pack does NOT bind-mount the repo, so the
# source is baked into an image (Dockerfile.coolify). api builds it; ui reuses
# the same image. Runs dev servers (tsx watch / vite), not the CI Dockerfiles
# (which expect a prebuilt dist/). Migrations run in the api command on boot.
#
# Only the `ui` service is exposed publicly (SERVICE_FQDN_UI_3000); it proxies
# /v1 to the api container (same-origin -> no CORS / cookie-domain pain).

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonoma
    volumes:
      # Postgres 18+ rejects a mount at .../data ("unused mount/volume"); the
      # mount must be at /var/lib/postgresql (data lands in a version subdir).
      - pgdata18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${APP_URL:-http://localhost:3000}
    depends_on:
      - temporal

  api:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    working_dir: /app
    environment:
      # dev NODE_ENV keeps better-auth's crossSubDomainCookies OFF, so the
      # session cookie is host-only on the ui origin (same-origin via proxy).
      NODE_ENV: development
      API_PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autonoma
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      PREVIEWKIT_ENV: "true"       # enables email/password auth (no Google needed)
      LOCAL_DEV: "true"            # fake GitHub app so boot needs no GH creds
      STRIPE_ENABLED: "false"
      INTERNAL_DOMAIN: ${INTERNAL_DOMAIN:-autonoma.app}
      APP_URL: ${APP_URL:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in Coolify}
      SCENARIO_ENCRYPTION_KEY: ${SCENARIO_ENCRYPTION_KEY:?set in Coolify}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-disabled}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-disabled}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-placeholder}
      GROQ_KEY: ${GROQ_KEY:-placeholder}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-placeholder}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-autonoma}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-unused}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-unused}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        cd packages/db && pnpm exec prisma migrate deploy && cd /app && touch .env && pnpm api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    working_dir: /app
    environment:
      API_PORT: "4000"
      API_PROXY_TARGET: http://api:4000
      ALLOWED_HOSTS: "*"
      VITE_API_URL: ""
      VITE_INTERNAL_DOMAIN: ${INTERNAL_DOMAIN:-autonoma.app}
    entrypoint: ["/bin/sh", "-lc"]
    command: ["pnpm ui -- --host 0.0.0.0"]
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"

volumes:
  pgdata18:
  redisdata:
