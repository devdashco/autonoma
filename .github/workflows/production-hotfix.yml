name: Deploy Production Hotfix

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit SHA to cherry-pick onto the revision currently running in production"
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: deploy-production-hotfix
  cancel-in-progress: false

jobs:
  hotfix:
    name: Prepare and deploy hotfix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_SERVICE_ACCOUNT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SERVICE_ACCOUNT_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Create hotfix revision
        id: hotfix
        env:
          HOTFIX_INPUT: ${{ inputs.commit }}
        run: |
          if [[ ! "$HOTFIX_INPUT" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            echo "::error::Commit must be a Git SHA containing 7 to 40 hexadecimal characters"
            exit 1
          fi

          git fetch --force --tags origin

          if ! SOURCE_COMMIT=$(git rev-parse --verify "${HOTFIX_INPUT}^{commit}"); then
            echo "::error::Commit $HOTFIX_INPUT was not found in this repository"
            exit 1
          fi

          PARENT_COUNT=$(git rev-list --parents -n 1 "$SOURCE_COMMIT" | awk '{ print NF - 1 }')
          if [ "$PARENT_COUNT" -ne 1 ]; then
            echo "::error::Commit $SOURCE_COMMIT has $PARENT_COUNT parents. Supply a single-parent commit rather than a merge commit."
            exit 1
          fi

          API_IMAGE=$(kubectl get deployment api -n production -o jsonpath='{.spec.template.spec.containers[0].image}')
          IMAGE_NO_DIGEST="${API_IMAGE%%@*}"
          IMAGE_NAME="${IMAGE_NO_DIGEST##*/}"
          BASE_TAG="${IMAGE_NAME##*:}"

          if [ -z "$BASE_TAG" ] || [ "$BASE_TAG" = "$IMAGE_NAME" ]; then
            echo "::error::Could not extract the current production version from $API_IMAGE"
            exit 1
          fi

          if ! BASE_COMMIT=$(git rev-parse --verify "refs/tags/${BASE_TAG}^{commit}"); then
            echo "::error::Production is running $API_IMAGE, but Git tag $BASE_TAG does not exist"
            echo "::error::Restore the missing tag before attempting a hotfix"
            exit 1
          fi

          if git merge-base --is-ancestor "$SOURCE_COMMIT" "$BASE_COMMIT"; then
            echo "::error::Commit $SOURCE_COMMIT is already part of production revision $BASE_TAG"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --detach "$BASE_COMMIT"

          if ! git cherry-pick "$SOURCE_COMMIT"; then
            git cherry-pick --abort || true
            echo "::error::The hotfix does not cherry-pick cleanly onto production revision $BASE_TAG"
            exit 1
          fi

          HOTFIX_COMMIT=$(git rev-parse HEAD)
          HOTFIX_TAG="prod-hotfix-${HOTFIX_COMMIT:0:12}"

          if git ls-remote --exit-code --tags origin "refs/tags/$HOTFIX_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $HOTFIX_TAG already exists"
            exit 1
          fi

          git tag "$HOTFIX_TAG" "$HOTFIX_COMMIT"
          git push origin "refs/tags/$HOTFIX_TAG"

          echo "base-tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          echo "source-commit=$SOURCE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "hotfix-commit=$HOTFIX_COMMIT" >> "$GITHUB_OUTPUT"
          echo "hotfix-tag=$HOTFIX_TAG" >> "$GITHUB_OUTPUT"

      - name: Trigger production deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
          HOTFIX_TAG: ${{ steps.hotfix.outputs.hotfix-tag }}
        run: |
          gh workflow run production-build.yml \
            --ref "$HOTFIX_TAG" \
            -f version="$HOTFIX_TAG"

          RUN_ID=""
          for _ in $(seq 1 30); do
            RUN_ID=$(gh run list \
              --workflow production-build.yml \
              --branch "$HOTFIX_TAG" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')

            if [ -n "$RUN_ID" ]; then
              break
            fi

            sleep 2
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::The production deployment was dispatched, but its workflow run could not be found"
            exit 1
          fi

          RUN_URL=$(gh run view "$RUN_ID" --json url --jq .url)
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run-url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Summarize deployment
        env:
          BASE_TAG: ${{ steps.hotfix.outputs.base-tag }}
          SOURCE_COMMIT: ${{ steps.hotfix.outputs.source-commit }}
          HOTFIX_COMMIT: ${{ steps.hotfix.outputs.hotfix-commit }}
          HOTFIX_TAG: ${{ steps.hotfix.outputs.hotfix-tag }}
          RUN_URL: ${{ steps.deployment.outputs.run-url }}
        run: |
          {
            echo "## Production hotfix"
            echo ""
            echo "- Production base: \`$BASE_TAG\`"
            echo "- Cherry-picked commit: \`$SOURCE_COMMIT\`"
            echo "- Deployed revision: \`$HOTFIX_COMMIT\`"
            echo "- Deployment tag: \`$HOTFIX_TAG\`"
            echo "- Deployment workflow: $RUN_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for production deployment
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.deployment.outputs.run-id }}
        run: gh run watch "$RUN_ID" --exit-status --interval 10
