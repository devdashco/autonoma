name: Previewkit Builder Image

# Rebuild + push the uniform previewkit BUILD image whenever its Dockerfile lands
# on main. The image is referenced by the runtime at a pinned tag, so this pushes
# that same tag (overwriting it) plus an immutable :<sha> for traceability.
on:
  push:
    branches: [main]
    paths:
      - apps/previewkit/src/docker/builder.Dockerfile
      - .github/workflows/previewkit-builder-image.yml
  workflow_dispatch:

concurrency:
  group: previewkit-builder-image
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE: public.ecr.aws/autonoma/builder
  # Keep in sync with the tag in apps/previewkit/src/docker/builder.Dockerfile's header.
  IMAGE_TAG: al2023-1

jobs:
  build-and-push:
    name: Build & push builder image
    if: github.repository == 'Autonoma-AI/agent'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # The image compiles Erlang/OTP from source (asdf), so allow a generous budget.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_SERVICE_ACCOUNT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SERVICE_ACCOUNT_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build & push
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          context: .
          file: apps/previewkit/src/docker/builder.Dockerfile
          # App builds pin linux/amd64, so amd64 is the only required arch.
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:${{ github.sha }}
