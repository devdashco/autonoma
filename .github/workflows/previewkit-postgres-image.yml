name: Previewkit Postgres Image

# Rebuild + push the previewkit default Postgres image whenever its Dockerfile
# lands on main. Built for the last 4 supported majors via a matrix on PG_MAJOR
# (the Dockerfile's version knob). amd64 only: the preview Karpenter nodepool is
# restricted to linux/amd64, so an arm64 variant would never be scheduled.
#
# 18 is intentionally omitted: the Dockerfile pins PGRX_VERSION=0.12.9, which
# supports PG 13-17 only. Add "18" here once PGRX_VERSION is bumped to a release
# with PG18 support.
on:
  push:
    branches: [main]
    paths:
      - apps/previewkit/src/docker/postgres.Dockerfile
      - .github/workflows/previewkit-postgres-image.yml
  workflow_dispatch:

concurrency:
  group: previewkit-postgres-image
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE: public.ecr.aws/autonoma/postgres

jobs:
  build-and-push:
    name: postgres ${{ matrix.pg_major }}
    if: github.repository == 'Autonoma-AI/agent'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 90
    strategy:
      # One failing major must not cancel the others.
      fail-fast: false
      matrix:
        pg_major: ["17", "16", "15", "14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_SERVICE_ACCOUNT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SERVICE_ACCOUNT_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build & push
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          context: .
          file: apps/previewkit/src/docker/postgres.Dockerfile
          platforms: linux/amd64
          build-args: |
            PG_MAJOR=${{ matrix.pg_major }}
          tags: |
            ${{ env.IMAGE }}:${{ matrix.pg_major }}
            ${{ env.IMAGE }}:${{ matrix.pg_major }}-${{ github.sha }}
