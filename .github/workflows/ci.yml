name: CI Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate Pull Request title
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Conventional Commit Validation
        uses: ytanikin/pr-conventional-commits@1.5.1
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert", "style"]'
          add_label: "false"

  changes:
    name: Detect changes
    if: github.event.pull_request.draft == false
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            db:
              - 'packages/db/prisma/**'

  check-migrations:
    name: Check Prisma Migrations
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.db == 'true'
    services:
      shadow-db:
        image: postgres:18
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prisma"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending migrations
        env:
          DATABASE_URL: "postgresql://prisma:prisma@localhost:5432/shadow"
        run: |
          SHADOW_URL="postgresql://prisma:prisma@localhost:5432/shadow"
          cat > packages/db/prisma.config.ts <<EOF
          import { defineConfig } from "prisma/config";
          export default defineConfig({
            schema: "prisma/schema.prisma",
            migrations: { path: "prisma/migrations" },
            datasource: { url: "${SHADOW_URL}", shadowDatabaseUrl: "${SHADOW_URL}" },
          });
          EOF
          diff_output=$(pnpm -F @autonoma/db db migrate diff --from-migrations ./prisma/migrations --to-schema ./prisma/schema.prisma --exit-code 2>&1) || exit_code=$?
          if [ "${exit_code:-0}" -eq 2 ]; then
            echo "::error::Prisma schema has changes not covered by a migration. Run 'pnpm db:migrate' to create one."
            echo "$diff_output"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --continue

  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @autonoma/engine-web exec playwright install --with-deps chromium

      - name: Test
        # No API keys here on purpose: `pnpm test` runs only deterministic, key-free unit tests. The
        # live-model tests (real, paid, non-deterministic calls) are excluded from every package's
        # default `test` script and run on demand via `pnpm eval`.
        #
        # Concurrency capped to the runner's actual vCPU count: turbo's default (10) oversubscribes
        # a 4vcpu box once every package runs together, and CPU-starved event-loop scheduling was
        # blowing packages/ai's agent-loop test past its own 30s timeout (no artificial delay in that
        # test - just 1000 mock-model iterations that should finish in milliseconds when not starved).
        run: pnpm turbo run test --continue --concurrency=4

  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter "./apps/*" --filter "./apps/jobs/*" --filter "./apps/workers/*"

  typecheck:
    name: Typecheck
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck --continue
