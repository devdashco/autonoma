name: Publish CLI to npm

# Publishes @autonoma-ai/planner (apps/cli) to npm. Fires ONLY for the CLI's
# own release tags (cli-v*), which release-please creates independently of the
# root v* tags. The k8s production deploy (production-build.yml) is guarded to
# only run on root v* tags, so a CLI release never deploys and vice-versa.

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: cli-publish
  cancel-in-progress: false

jobs:
  npm:
    name: Publish to npm
    # Guard: only the CLI component's releases. Root releases are tagged v*.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'release'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to a commit not on main. Skipping publish."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @autonoma-ai/planner typecheck
      - run: pnpm --filter @autonoma-ai/planner test
      - run: pnpm --filter @autonoma-ai/planner build

      - name: Check if version already on npm
        id: npm_check
        working-directory: apps/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm - skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @autonoma-ai/planner publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Job summary
        if: steps.npm_check.outputs.already_published == 'false'
        run: |
          {
            echo "## Published"
            echo ""
            echo "\`${{ steps.npm_check.outputs.name }}@${{ steps.npm_check.outputs.version }}\` is live on npm."
            echo ""
            echo '```bash'
            echo "npx ${{ steps.npm_check.outputs.name }}@latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
