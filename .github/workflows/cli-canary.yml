name: Publish CLI canary to npm

# Publishes @autonoma-ai/planner (apps/cli) under a pre-release channel for
# testing. Never touches the release-please manifest/tags - stable releases
# (cli-v* tags -> @latest via cli-publish.yml) are untouched.
#
# Version format: <next-cli-patch>-canary.<short-sha>
# npm dist-tag:    canary
#
# Triggers:
#   - push to `cli-canary` branch (apps/cli changes) -> publish every pushed commit
#   - schedule (daily 07:00 UTC)                      -> nightly from `cli-canary`
#   - workflow_dispatch                               -> manual publish from any branch
#
# Scoped to the CLI only: it bumps and publishes apps/cli's package.json and
# nothing else in the monorepo.

on:
  push:
    branches: [cli-canary]
    paths:
      - "apps/cli/**"
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: cli-canary-publish
  cancel-in-progress: true

jobs:
  npm:
    name: Publish CLI canary to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # `schedule` events always fire on the default branch (main) regardless
          # of the `branches:` filter, so pin the nightly run to cli-canary
          # explicitly. push/workflow_dispatch already check out their own ref.
          ref: ${{ github.event_name == 'schedule' && 'cli-canary' || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Derive canary version
        id: version
        run: |
          BASE=$(node -p "require('./.release-please-manifest.json')['apps/cli']")
          SHORT_SHA=$(git rev-parse --short=7 "$GITHUB_SHA")
          BUMPED=$(node -e "const v='$BASE'.split('.'); v[v.length-1]=String(parseInt(v[v.length-1],10)+1); console.log(v.join('.'))")
          CANARY="${BUMPED}-canary.${SHORT_SHA}"
          echo "version=$CANARY" >> "$GITHUB_OUTPUT"
          echo "Canary version: $CANARY"

      - name: Check if canary version already on npm
        id: npm_check
        working-directory: apps/cli
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm - nothing to publish (commit unchanged)."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write canary version into apps/cli/package.json
        if: steps.npm_check.outputs.already_published == 'false'
        env:
          CANARY_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const path='apps/cli/package.json'; const p=JSON.parse(fs.readFileSync(path,'utf8')); p.version=process.env.CANARY_VERSION; fs.writeFileSync(path, JSON.stringify(p,null,4)+'\n');"

      - name: Typecheck
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @autonoma-ai/planner typecheck
      - name: Test
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @autonoma-ai/planner test
      - name: Build
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @autonoma-ai/planner build

      - name: Publish with canary tag
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @autonoma-ai/planner publish --access public --no-git-checks --tag canary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Job summary
        if: steps.npm_check.outputs.already_published == 'false'
        run: |
          {
            echo "## CLI canary published"
            echo ""
            echo "Version: \`${{ steps.version.outputs.version }}\`"
            echo ""
            echo '```bash'
            echo "npx @autonoma-ai/planner@canary"
            echo '```'
            echo ""
            echo "Stable \`@latest\` tag is untouched."
          } >> "$GITHUB_STEP_SUMMARY"
