name: PR Approval Slack Notification

on:
  pull_request_review:
    types: [submitted]

permissions:
  actions: read
  contents: read

concurrency:
  group: pr-approval-slack-notify-${{ github.event.pull_request.number }}-${{ github.event.review.user.id }}
  cancel-in-progress: false

jobs:
  notify:
    name: Notify Slack of PR approval
    runs-on: ubuntu-latest
    # Only human approval reviews should produce a Slack thread reply. Skip
    # draft and bot-authored PRs because no parent Slack thread is created.
    if: github.event.review.state == 'approved' && github.event.review.user.type != 'Bot' && github.event.pull_request.user.type != 'Bot' && github.event.pull_request.draft == false
    steps:
      - name: Find PR Slack thread
        id: thread
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          artifact_name="pr-slack-thread-${PR_NUMBER}"
          artifact_id=""
          trusted_workflow_path=".github/workflows/pr-review-notify.yml"

          find_trusted_artifact() {
            artifact_id=""
            artifacts=$(gh api \
              --method GET \
              "/repos/${REPO}/actions/artifacts" \
              -f name="$artifact_name" \
              -f per_page=100)

            while IFS=$'\t' read -r candidate_id workflow_run_id; do
              if [ -z "$candidate_id" ] || [ -z "$workflow_run_id" ]; then
                continue
              fi

              if ! run_info=$(gh api \
                "/repos/${REPO}/actions/runs/${workflow_run_id}" \
                --jq '[.path // "", .event // "", .status // "", .conclusion // ""] | @tsv'); then
                echo "Could not read workflow run ${workflow_run_id}; skipping artifact ${candidate_id}." >&2
                continue
              fi

              IFS=$'\t' read -r run_path run_event run_status run_conclusion <<< "$run_info"
              if [ "$run_path" = "$trusted_workflow_path" ] && [ "$run_event" = "pull_request" ] && [ "$run_status" = "completed" ] && [ "$run_conclusion" = "success" ]; then
                artifact_id="$candidate_id"
                return 0
              fi
            done < <(printf '%s' "$artifacts" | jq -r '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[] | [.id, .workflow_run.id] | @tsv')
          }

          for attempt in 1 2 3 4 5 6; do
            find_trusted_artifact
            if [ -n "$artifact_id" ]; then
              break
            fi

            if [ "$attempt" != "6" ]; then
              sleep 10
            fi
          done

          if [ -z "$artifact_id" ]; then
            echo "No trusted Slack thread artifact found for PR #${PR_NUMBER}; skipping approval notification." >&2
            exit 0
          fi

          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT

          if ! curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/artifacts/${artifact_id}/zip" \
            --output "$tmp_dir/artifact.zip"; then
            echo "Slack thread artifact ${artifact_id} could not be downloaded; skipping approval notification." >&2
            exit 0
          fi

          if ! unzip -q "$tmp_dir/artifact.zip" -d "$tmp_dir/artifact"; then
            echo "Slack thread artifact ${artifact_id} was not a valid zip archive; skipping approval notification." >&2
            exit 0
          fi
          thread_json=$(find "$tmp_dir/artifact" -name slack-thread.json -type f -print -quit)

          if [ -z "$thread_json" ]; then
            echo "Slack thread artifact ${artifact_id} did not contain slack-thread.json; skipping approval notification." >&2
            exit 0
          fi

          artifact_pr_number=$(jq -r '.pr_number // ""' "$thread_json")
          channel_id=$(jq -r '.channel_id // ""' "$thread_json")
          thread_ts=$(jq -r '.thread_ts // ""' "$thread_json")

          if [ "$artifact_pr_number" != "$PR_NUMBER" ]; then
            echo "Slack thread artifact ${artifact_id} was for PR #${artifact_pr_number}, not PR #${PR_NUMBER}; skipping approval notification." >&2
            exit 0
          fi

          if [ -z "$channel_id" ] || [ -z "$thread_ts" ]; then
            echo "Slack thread artifact ${artifact_id} is missing channel_id or thread_ts; skipping approval notification." >&2
            exit 0
          fi

          {
            echo "channel_id=$channel_id"
            echo "thread_ts=$thread_ts"
          } >> "$GITHUB_OUTPUT"

      - name: Check previous approval notification
        id: dedupe
        if: steps.thread.outputs.thread_ts != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEWER_ID: ${{ github.event.review.user.id }}
        run: |
          set -euo pipefail

          marker_name="pr-slack-approval-${PR_NUMBER}-${REVIEWER_ID}"
          trusted_workflow_path=".github/workflows/pr-approval-slack-notify.yml"
          already_notified="false"

          artifacts=$(gh api \
            --method GET \
            "/repos/${REPO}/actions/artifacts" \
            -f name="$marker_name" \
            -f per_page=100)

          while IFS=$'\t' read -r candidate_id workflow_run_id; do
            if [ -z "$candidate_id" ] || [ -z "$workflow_run_id" ]; then
              continue
            fi

            if ! run_info=$(gh api \
              "/repos/${REPO}/actions/runs/${workflow_run_id}" \
              --jq '[.path // "", .event // "", .status // "", .conclusion // ""] | @tsv'); then
              echo "Could not read workflow run ${workflow_run_id}; skipping approval marker ${candidate_id}." >&2
              continue
            fi

            IFS=$'\t' read -r run_path run_event run_status run_conclusion <<< "$run_info"
            if [ "$run_path" = "$trusted_workflow_path" ] && [ "$run_event" = "pull_request_review" ] && [ "$run_status" = "completed" ] && [ "$run_conclusion" = "success" ]; then
              already_notified="true"
              break
            fi
          done < <(printf '%s' "$artifacts" | jq -r '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[] | [.id, .workflow_run.id] | @tsv')

          if [ "$already_notified" = "true" ]; then
            echo "Approval notification already posted for reviewer ${REVIEWER_ID} on PR #${PR_NUMBER}; skipping duplicate." >&2
          fi

          {
            echo "already_notified=$already_notified"
            echo "marker_name=$marker_name"
          } >> "$GITHUB_OUTPUT"

      - name: Post approval to Slack thread
        id: approval
        if: steps.thread.outputs.thread_ts != '' && steps.dedupe.outputs.already_notified != 'true'
        env:
          # The same per-user token map used by pr-review-notify.yml, so approval
          # replies can be posted as the reviewer when that token is available.
          SLACK_USER_TOKENS: ${{ secrets.SLACK_USER_TOKENS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ steps.thread.outputs.channel_id }}
          SLACK_THREAD_TS: ${{ steps.thread.outputs.thread_ts }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEWER_ID: ${{ github.event.review.user.id }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_URL: ${{ github.event.review.html_url }}
        run: |
          set -euo pipefail

          reviewer_token=""
          if [ -n "${SLACK_USER_TOKENS:-}" ]; then
            if printf '%s' "$SLACK_USER_TOKENS" | jq -e . >/dev/null 2>&1; then
              reviewer_lc=$(printf '%s' "$REVIEWER" | tr '[:upper:]' '[:lower:]')
              reviewer_token=$(printf '%s' "$SLACK_USER_TOKENS" | jq -r --arg login "$reviewer_lc" '.[$login] // ""')
            else
              echo "SLACK_USER_TOKENS is set but is not valid JSON; ignoring it and using the bot fallback." >&2
            fi
          fi

          review_url="${REVIEW_URL:-$PR_URL}"
          fallback="@${REVIEWER} approved PR #${PR_NUMBER}: ${PR_TITLE}"

          payload=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg thread_ts "$SLACK_THREAD_TS" \
            --arg reviewer "$REVIEWER" \
            --arg number "$PR_NUMBER" \
            --arg review_url "$review_url" \
            --arg fallback "$fallback" \
            '{
              channel: $channel,
              thread_ts: $thread_ts,
              text: $fallback,
              blocks: [
                { "type": "markdown", "text": ("Approved by @" + $reviewer + " | # " + $number) },
                { "type": "markdown", "text": $review_url }
              ]
            }')

          post_to_slack() {
            curl -sS -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${1}" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data "$payload"
          }

          slack_ok() { [ "$(printf '%s' "$1" | jq -r '.ok')" = "true" ]; }

          record_approval() {
            message_ts="$1"
            mkdir -p .slack-approval-marker
            jq -n \
              --arg pr_number "$PR_NUMBER" \
              --arg reviewer "$REVIEWER" \
              --arg reviewer_id "$REVIEWER_ID" \
              --arg review_id "$REVIEW_ID" \
              --arg review_url "$review_url" \
              --arg slack_channel_id "$SLACK_CHANNEL_ID" \
              --arg slack_thread_ts "$SLACK_THREAD_TS" \
              --arg slack_message_ts "$message_ts" \
              '{
                pr_number: $pr_number,
                reviewer: $reviewer,
                reviewer_id: $reviewer_id,
                review_id: $review_id,
                review_url: $review_url,
                slack_channel_id: $slack_channel_id,
                slack_thread_ts: $slack_thread_ts,
                slack_message_ts: $slack_message_ts
              }' > .slack-approval-marker/approval.json

            echo "posted=true" >> "$GITHUB_OUTPUT"
          }

          if [ -n "$reviewer_token" ]; then
            response=$(post_to_slack "$reviewer_token")
            if slack_ok "$response"; then
              record_approval "$(printf '%s' "$response" | jq -r '.ts // ""')"
              echo "Posted PR approval notification as @${REVIEWER} to thread ${SLACK_THREAD_TS}."
              exit 0
            fi
            echo "Reviewer-token post failed for @${REVIEWER}: $(printf '%s' "$response" | jq -r '.error // "unknown"'). Falling back to bot token." >&2
          fi

          if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "No user token for @${REVIEWER} and SLACK_BOT_TOKEN is unset, skipping approval notification." >&2
            exit 0
          fi

          response=$(post_to_slack "$SLACK_BOT_TOKEN")
          if ! slack_ok "$response"; then
            echo "Slack API call failed: $response" >&2
            exit 1
          fi

          record_approval "$(printf '%s' "$response" | jq -r '.ts // ""')"
          echo "Sent PR approval notification to Slack thread ${SLACK_THREAD_TS} (bot fallback)."

      - name: Store approval notification marker
        if: steps.approval.outputs.posted == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dedupe.outputs.marker_name }}
          path: .slack-approval-marker/approval.json
          retention-days: 90
