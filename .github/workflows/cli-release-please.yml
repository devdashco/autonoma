name: CLI Release Please

# Independent release-please for @autonoma-ai/planner (apps/cli), kept entirely
# separate from the root release flow in release-please.yml.
#
# Why a separate workflow: the root release-please runs in single-package mode
# (it passes `release-type: node` at the top level, which ignores extra packages
# in release-please-config.json and always-bump-patches the root for the k8s
# deploy). Adding apps/cli to that shared config does nothing. This workflow runs
# release-please in true manifest mode against cli-only config/manifest files, so
# the CLI gets its own `cli-v*` tags and release PRs without touching the root
# versioning or the k8s deploy.
#
# On a merged release PR, release-please creates the `cli-v*` GitHub release,
# whose `release: published` event triggers cli-publish.yml to publish to npm.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cli-release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.ACTIONS_APP_CLIENT_ID }}
          private-key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}
      - name: Run release-please (cli)
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config-cli.json
          manifest-file: .release-please-manifest-cli.json
